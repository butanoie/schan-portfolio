name: Manual Deploy to Production

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (must be on main and deployed to staging). Leave blank for latest.'
        required: false
        default: ''
        type: string

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      deploy_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Verify main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Production deployments are only allowed from the main branch."
          echo "Current ref: $GITHUB_REF"
          exit 1
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Resolve deploy commit
        id: resolve
        env:
          INPUT_SHA: ${{ github.event.inputs.commit_sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$INPUT_SHA" ]; then
            echo "No commit SHA specified, using HEAD of main: $HEAD_SHA"
            echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "Using specified commit SHA: $INPUT_SHA"
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify commit exists on main
        if: github.event.inputs.commit_sha != ''
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm commit is reachable from main
        if: github.event.inputs.commit_sha != ''
        env:
          DEPLOY_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          if ! git merge-base --is-ancestor "$DEPLOY_SHA" HEAD; then
            echo "::error::Commit $DEPLOY_SHA is not on the main branch."
            exit 1
          fi
          echo "Confirmed commit $DEPLOY_SHA is on main."

      - name: Verify staging deployment via GitHub Deployments
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.resolve.outputs.sha }}
          STAGING_ENV: ${{ vars.RAILWAY_STAGING_DEPLOY_ENV_NAME }}
        run: |
          echo "Checking GitHub Deployments for successful staging deployment of commit $COMMIT_SHA..."

          # Query GitHub Deployments API for this commit in the staging environment
          DEPLOYMENTS=$(gh api "repos/${{ github.repository }}/deployments?sha=$COMMIT_SHA&environment=$STAGING_ENV&per_page=10" 2>&1)

          if [ $? -ne 0 ]; then
            echo "::error::Failed to query GitHub Deployments API."
            echo "$DEPLOYMENTS"
            exit 1
          fi

          COUNT=$(echo "$DEPLOYMENTS" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "::error::No staging deployment found for commit $COMMIT_SHA in environment '$STAGING_ENV'."
            echo "::error::Railway must auto-deploy this commit to staging before it can be promoted to production."
            exit 1
          fi

          # Check if any deployment has a successful status
          FOUND_SUCCESS=false
          for DEPLOY_ID in $(echo "$DEPLOYMENTS" | jq -r '.[].id'); do
            STATE=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" --jq '.[0].state')
            echo "Deployment $DEPLOY_ID status: $STATE"
            if [ "$STATE" = "success" ]; then
              FOUND_SUCCESS=true
              break
            fi
          done

          if [ "$FOUND_SUCCESS" != "true" ]; then
            echo "::error::No successful staging deployment found for commit $COMMIT_SHA."
            echo "::error::Latest deployment status was: $STATE"
            exit 1
          fi

          echo "Confirmed successful staging deployment for commit $COMMIT_SHA. Proceeding."

  deploy-production:
    needs: preflight
    runs-on: ubuntu-latest
    # ⚠️ REQUIRES MANUAL APPROVAL
    # This deployment is protected by environment rules.
    # A reviewer must approve before deployment proceeds.
    # Configure in: Settings → Environments → Sing Portfolio / production → Required reviewers
    environment: "Sing Portfolio / production"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.deploy_sha }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set SENTRY_RELEASE on Railway
        run: railway variable set SENTRY_RELEASE=$DEPLOY_SHA --service=${{ vars.RAILWAY_SERVICE_NAME }} --environment=production --skip-deploys
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          DEPLOY_SHA: ${{ needs.preflight.outputs.deploy_sha }}

      - name: Deploy to Railway Production
        run: railway up --project=${{ vars.RAILWAY_PROJECT_ID }} --service=${{ vars.RAILWAY_SERVICE_NAME }} --environment=production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment Summary
        env:
          DEPLOYED_BY: ${{ github.actor }}
          COMMIT_SHA: ${{ needs.preflight.outputs.deploy_sha }}
        run: |
          echo "Deployment to production complete"
          echo "Deployed commit: $COMMIT_SHA"
          echo "Deployed by: $DEPLOYED_BY"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
