name: Manual Deploy to Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (must be on main and deployed to staging). Leave blank for latest.'
        required: false
        default: ''
        type: string

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      deploy_sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Verify main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Production deployments are only allowed from the main branch."
          echo "Current ref: $GITHUB_REF"
          exit 1
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Resolve deploy commit
        id: resolve
        env:
          INPUT_SHA: ${{ github.event.inputs.commit_sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$INPUT_SHA" ]; then
            echo "No commit SHA specified, using HEAD of main: $HEAD_SHA"
            echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "Using specified commit SHA: $INPUT_SHA"
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify commit exists on main
        if: github.event.inputs.commit_sha != ''
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Confirm commit is reachable from main
        if: github.event.inputs.commit_sha != ''
        env:
          DEPLOY_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          if ! git merge-base --is-ancestor "$DEPLOY_SHA" HEAD; then
            echo "::error::Commit $DEPLOY_SHA is not on the main branch."
            exit 1
          fi
          echo "Confirmed commit $DEPLOY_SHA is on main."

      - name: Verify staging deployment on Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_STAGING_ENV_ID: ${{ vars.RAILWAY_STAGING_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          COMMIT_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          echo "Checking Railway staging for successful deployment of commit $COMMIT_SHA..."

          # Query Railway GraphQL API for deployments matching this commit in staging
          # serviceId is required — without it the API returns null for edges
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"query { deployments(input: { projectId: \\\"$RAILWAY_PROJECT_ID\\\", environmentId: \\\"$RAILWAY_STAGING_ENV_ID\\\", serviceId: \\\"$RAILWAY_SERVICE_ID\\\" }) { edges { node { id status meta } } } }\"
            }" \
            "https://backboard.railway.app/graphql/v2")

          # Verify the API returned valid data before querying
          ERRORS=$(echo "$RESPONSE" | jq -r '.errors // [] | length')
          if [ "$ERRORS" != "0" ]; then
            echo "::error::Railway API returned errors:"
            echo "$RESPONSE" | jq '.errors' 2>/dev/null || echo "$RESPONSE"
            exit 1
          fi

          # Check if any deployment matches this commit SHA and has SUCCESS status
          # Use '// []' fallback to handle null edges gracefully
          MATCH=$(echo "$RESPONSE" | jq -r \
            --arg sha "$COMMIT_SHA" \
            '[(.data.deployments.edges // [])[] | .node | select((.meta.commitHash // .meta.commit_hash // "") == $sha and .status == "SUCCESS")] | length')

          if [ "$MATCH" = "0" ] || [ "$MATCH" = "null" ] || [ -z "$MATCH" ]; then
            echo "::error::No successful staging deployment found on Railway for commit $COMMIT_SHA."
            echo "::error::Railway must auto-deploy this commit to staging before it can be promoted to production."
            echo "API response for debugging:"
            echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"
            exit 1
          fi

          echo "Found $MATCH successful staging deployment(s) for this commit. Proceeding."

  deploy-production:
    needs: preflight
    runs-on: ubuntu-latest
    # ⚠️ REQUIRES MANUAL APPROVAL
    # This deployment is protected by environment rules.
    # A reviewer must approve before deployment proceeds.
    # Configure in: Settings → Environments → Sing Portfolio / production → Required reviewers
    environment: "Sing Portfolio / production"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.deploy_sha }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Production
        run: railway up --project=${{ vars.RAILWAY_PROJECT_ID }} --service=${{ vars.RAILWAY_SERVICE_NAME }} --environment=production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment Summary
        env:
          DEPLOYED_BY: ${{ github.actor }}
          COMMIT_SHA: ${{ needs.preflight.outputs.deploy_sha }}
        run: |
          echo "Deployment to production complete"
          echo "Deployed commit: $COMMIT_SHA"
          echo "Deployed by: $DEPLOYED_BY"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
