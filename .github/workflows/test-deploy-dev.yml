name: Lint, Type Check, Unit Test, and Deploy

on:
  pull_request:
    branches:
      - main

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has-v2-changes: ${{ steps.detect.outputs.has-v2-changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect v2 folder changes
        id: detect
        run: |
          # Get list of changed files compared to base branch
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt

          # Check if any changes are in v2/ folder or .github/workflows/
          has_v2_changes=$(grep -E '^(v2/|\.github/workflows/)' /tmp/changed_files.txt | wc -l)

          if [ $has_v2_changes -gt 0 ]; then
            echo "has-v2-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-v2-changes=false" >> $GITHUB_OUTPUT
          fi

          echo "Changed files:"
          cat /tmp/changed_files.txt

  tests:
    needs: check-changes
    runs-on: ubuntu-latest
    if: needs.check-changes.outputs.has-v2-changes == 'true'

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'v2/package-lock.json'

      - name: Install dependencies
        working-directory: v2
        run: npm ci --no-fund --loglevel=error

      - name: Run ESLint
        working-directory: v2
        run: npm run lint

      - name: Run Type Check
        working-directory: v2
        run: npm run typecheck

      - name: Run Unit Test
        working-directory: v2
        run: npm run test

  deploy:
    needs: [check-changes, tests]
    runs-on: ubuntu-latest
    if: needs.check-changes.outputs.has-v2-changes == 'true'
    # ⚠️ REQUIRES MANUAL APPROVAL
    # This deployment is protected by environment rules.
    # A reviewer must approve before deployment proceeds.
    # Configure in: Settings → Environments → Sing Portfolio / development → Required reviewers
    environment: "Sing Portfolio / development"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set SENTRY_RELEASE on Railway
        run: railway variable set SENTRY_RELEASE=$DEPLOY_SHA --service=${{ vars.RAILWAY_SERVICE_NAME }} --environment=development --skip-deploys
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          DEPLOY_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Deploy to Railway Development
        run: railway up --project=${{ vars.RAILWAY_PROJECT_ID }} --service=${{ vars.RAILWAY_SERVICE_NAME }} --environment=development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # Gate job: single required status check for branch protection.
  # Always runs so non-code PRs (where tests/deploy are skipped) can still merge.
  # In branch protection settings, replace individual job checks with this one.
  gate:
    needs: [check-changes, tests, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        env:
          HAS_V2_CHANGES: ${{ needs.check-changes.outputs.has-v2-changes }}
          TESTS_RESULT: ${{ needs.tests.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          # If v2 changes were detected, tests and deploy must have succeeded
          if [ "$HAS_V2_CHANGES" == "true" ]; then
            if [ "$TESTS_RESULT" != "success" ]; then
              echo "Tests failed or were cancelled"
              exit 1
            fi
            if [ "$DEPLOY_RESULT" != "success" ]; then
              echo "Deploy failed or was cancelled"
              exit 1
            fi
          fi
          echo "All required checks passed"
